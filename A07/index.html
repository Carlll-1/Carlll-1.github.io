<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Disney Characters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f1e9;
            font-family: 'Segoe UI', sans-serif;
        }

        .header {
            background-color: #d2b48c;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .picture-container {
            width: 100px;
            height: 100px;
            background-color: #e8d8c3;
            border-radius: 100px;
            overflow: hidden;
            margin: auto;
        }

        .picture-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .film-box {
            background-color: #f1e3ce;
        }

        .card {
            background-color: #fff9f4;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 576px) {
            .card {
                padding: 20px !important;
            }

            .picture-container {
                width: 80px;
                height: 80px;
            }

            .h5 {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Disney Characters</h1>
    </div>

    <div class="container mt-4">
        <div class="row" id="container"></div>
    </div>

    <script>
        async function getCharacters() {
            const response = await fetch('https://api.disneyapi.dev/character?page=1&pageSize=30');
            const json = await response.json();
            const characters = json.data;

            var mainContainer = document.getElementById("container");

            for (var i = 0; i < characters.length; i++) {
                var char = characters[i];
                var name = char.name;
                var film = (char.films.length > 0) ? char.films[0] : "No film listed";
                var img = char.imageUrl ? char.imageUrl : "https://via.placeholder.com/120x120?text=No+Image";

                mainContainer.innerHTML += '<div class="col-12 col-sm-6 col-md-4 col-lg-3">' +
                    '<div class="card my-3 text-center p-4 rounded-5 shadow">' +
                    '<div class="picture-container">' +
                    '<img src="' + img + '" alt="' + name + '" onerror="this.src=\'https://via.placeholder.com/120x120?text=No+Image\'">' +
                    '</div>' +
                    '<div class="mt-4 h5" id="name">' + name + '</div>' +
                    '<div class="mt-2 card rounded-5 p-2 film-box" id="type">' + film + '</div>' +
                    '</div>' +
                    '</div>';
            }
        }

        getCharacters();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
